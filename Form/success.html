<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Success</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" media="screen" href="./style.css" />
</head>

<body>
    <div class='wrapper'>
        <h1>Đăng ký thành công</h1>
        <div class='info'>
            <div id='name'>
                <div class='name'>Họ tên</div>
                <div class='value'></div>
            </div>
            <div id='birthday'>
                <div class='name'>Ngày sinh</div>
                <div class='value'></div>
            </div>
            <div id='sex'>
                <div class='name'>Giới tính</div>
                <div class='value'></div>
            </div>
            <div id='address'>
                <div class='name'>Địa chỉ</div>
                <div class='value'></div>
                <div class='clear'></div>
            </div>
            <div id='phone'>
                <div class='name'>Điện thoại</div>
                <div class='value'></div>
            </div>
            <div id='email'>
                <div class='name'>Email</div>
                <div class='value'></div>
            </div>
            <div id='password'>
                <div class='name'>Password</div>
                <div class='value'></div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>

    <script>
        let url = new URL(window.location.href);
        let name_val = url.searchParams.get("name");
        let birthday_val = url.searchParams.get("birthday");
        let sex_val = url.searchParams.get("sex");
        
        let address_val = url.searchParams.get("address");
        let phone_val = url.searchParams.get("phone");
        let email_val = url.searchParams.get("email");
        let password_val = url.searchParams.get("password");

        document.getElementsByClassName('value')[0].innerText = name_val;
        document.getElementsByClassName('value')[1].innerText = birthday_val;
        document.getElementsByClassName('value')[2].innerText = sex_val;
        document.getElementsByClassName('value')[3].innerText = address_val;
        document.getElementsByClassName('value')[4].innerText = phone_val;
        document.getElementsByClassName('value')[5].innerText = email_val;
        document.getElementsByClassName('value')[6].innerText = password_val;

    </script>
</body>

</html>
