<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Calculator</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
    <div class="wrap">
        <div class="row clearfix">
            <input type="text" id="result" class="result">
        </div>
        <div class="row five-cols clearfix">
            <div class="col">
                <span class="item clear yellow" onclick="reset(this)">AC</span>
            </div>
        </div>
        <div class="row five-cols clearfix">
            <div class="col">
                <span class="item number">0</span>
            </div>
            <div class="col">
                <span class="item number">1</span>
            </div>
            <div class="col">
                <span class="item number">2</span>
            </div>
            <div class="col">
                <span class="item number">3</span>
            </div>
            <div class="col">
                <span class="item number">4</span>
            </div>
        </div>
        <div class="row five-cols clearfix">
            <div class="col">
                <span class="item number">5</span>
            </div>
            <div class="col">
                <span class="item number">6</span>
            </div>
            <div class="col">
                <span class="item number">7</span>
            </div>
            <div class="col">
                <span class="item number">8</span>
            </div>
            <div class="col">
                <span class="item number">9</span>
            </div>
        </div>
        <div class="row five-cols clearfix">
            <div class="col">
                <span class="item bg-dark number">.</span>
            </div>
            <div class="col"><span class="item bg-dark number">&#43;</span>
                <!-- Cộng -->
            </div>
            <div class="col"><span class="item bg-dark number">&#45;</span>
                <!-- Trừ -->
            </div>
            <div class="col"><span class="item bg-dark number">&#42;</span>
                <!-- Nhân -->
            </div>
            <div class="col"><span class="item bg-dark number">&#47;</span>
                <!-- Chia -->
            </div>
        </div>
        <div class="row five-cols clearfix">
            <div class="col"><span class="item bg-dark" onclick="percent()">&#37;</span>
                <!-- Phần trăm -->
            </div>
            <div class="col"><span class="item bg-dark" onclick="Square()">&#178;</span>
                <!-- Bình phương -->
            </div>
            <div class="col"><span class="item bg-dark" onclick="factorial()">&#33;</span>
                <!-- Giai thừa -->
            </div>
            <div class="col"><span class="item bg-dark" onclick="radic()"> &radic;</span>
                <!-- Khai căn -->
            </div>
            <div class="col"><span class="item bg-dark  yellow" onclick="result()">&#61;</span>
                <!-- Kết quả -->
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="main.js" type="text/javascript"></script>
</body>

</html>
