<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="app">
        <p>Computer: {{ reverseComputed }}</p>
        <p>Fuction: {{ reverseFunc() }}</p>
    </div>

    <script src="https://unpkg.com/vue/dist/vue.js"></script>
    <script>
        let vm = new Vue({
            el : '#app',
            data : {
                title : 'một ngày nào đó',
            },
            computed : {
                reverseComputed : function() {
                    return this.title.split(" ").reverse().join(" ")
                }
            },
            methods : {
                reverseFunc : function() {
                    return this.title.split(" ").reverse().join(" ")
                }
            }
        })

        vm.title = "Bùi Văn Hiên"
    </script>
</body>
</html>
