<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script>
      const canvas = document.getElementById("canvas");
      canvas.width = 1000;
      canvas.height = 600;
      canvas.style.border = "2px solid";

      const ctx = canvas.getContext("2d");

      class Ball {
        constructor(x, y, r, dx, dy) {
          this.x = x;
          this.y = y;
          this.r = r;
          this.dx = dx;
          this.dy = dy;
        }
        draw() {
          ctx.beginPath();
          ctx.fillStyle = "green";
          ctx.arc(this.x, this.y, this.r, 0, 2 * Math.PI);
          ctx.fill();
          ctx.closePath();
        }
        move() {
          if (this.y + this.dy < this.r) {
            this.dy = -this.dy;
          }
          if (this.x + this.dx < this.r) {
            this.dx = -this.dx;
          }
          if (this.x + this.dx > canvas.width - this.r) {
            this.dx = -this.dx;
          }
          if (this.y + this.dy > canvas.height - this.r) {
            this.dy = 0;
            this.dx = 0;
          }
          this.x += this.dx;
          this.y += this.dy;
          this.draw();
        }
      }

      class Bar {
        constructor(x, y, width, height, color, score) {
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
          this.color = color;
          this.score = score;
        }
        draw() {
          ctx.beginPath();
          ctx.fillStyle = this.color;
          ctx.rect(this.x, this.y, this.width, this.height);
          ctx.fill();
          ctx.closePath();
        }
        drawLV() {
          ctx.beginPath();
          ctx.font = "15pt Times New Roman";
          ctx.fillStyle = "black";
          ctx.textAlign = "center";
          ctx.fillText(
            this.score,
            this.x + this.width / 2,
            this.y + this.height / 2 + 7
          );
        }
        move(x) {
          if (x - this.width / 2 < 0) {
            this.x = 0;
          } else if (x + this.width / 2 >= canvas.width) {
            this.x = canvas.width - this.width;
          } else {
            this.x = x - this.width / 2;
          }

          this.draw();
        }

        crash(ball) {
          let Ax = ball.x;
          let Ay = ball.y;
          if (ball.x < this.x) {
            Ax = this.x;
          }
          if (ball.x > this.x + this.width) {
            Ax = this.x + this.width;
          }
          if (ball.y < this.y) {
            Ay = this.y;
          }
          if (ball.y > this.y + this.height) {
            Ay = this.y + this.height;
          }

          if (Ay == ball.y && Math.sqrt(Math.pow(Ax - ball.x, 2)) <= ball.r) {
            ball.dy = -ball.dy;
            ball.dx = -ball.dx;
            return true;
          }
          if (
            Math.sqrt(Math.pow(Ax - ball.x, 2) + Math.pow(Ay - ball.y, 2)) <=
            ball.r
          ) {
            ball.dy = -ball.dy;
            return true;
          }
        }
      }

      let ball = new Ball(500, 510, 13, 0, 0);
      ball.draw();

      let bar = new Bar(450, 523, 100, 13, "red");
      bar.draw();
      function randomIndex(x) {
        return Math.floor(Math.random() * x);
      }
      let arrLv = [
        {
          color: "#f8efd4",
          score: 1,
        },
        {
          color: "#ffcb8e",
          score: 2,
        },
        {
          color: "#e97171",
          score: 3,
        },
        {
          color: "#ff414d",
          score: 4,
        },
      ];
      let arrbrick = [];

      function drawBrick() {
        for (let i = 0; i < 9; i++) {
          for (let j = 0; j < 3; j++) {
            let index = randomIndex(arrLv.length);

            let brick = new Bar(
              10 + i * 110,
              10 + j * 40,
              100,
              30,
              arrLv[index].color,
              arrLv[index].score
            );
            brick.draw();
            brick.drawLV();
            arrbrick.push(brick);
          }
        }
      }
      drawBrick();
      let count = 0;
      canvas.addEventListener("mousemove", function (e) {
        if (e.offsetX) {
          count += 1;
          if (count == 1) {
            ball.dx = 4;
            ball.dy = -4;
          }
          bar.move(e.offsetX);
        }
      });

      function animate() {
        requestAnimationFrame(animate);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        bar.draw();
        bar.crash(ball);
        ball.move();
        for (let i = 0; i < arrbrick.length; i++) {
          arrbrick[i].draw();
          arrbrick[i].drawLV();
          if (arrbrick[i].crash(ball)) {
            // arrbrick[i].crash(ball) = false;
            if (arrbrick[i].score == 1) {
              arrbrick.splice(i, 1);
            } else {
              arrbrick[i].score--;
              arrbrick[i].color = arrLv[arrbrick[i].score - 1].color;
            }
          }
        }
      }
      animate();
    </script>
  </body>
</html>
