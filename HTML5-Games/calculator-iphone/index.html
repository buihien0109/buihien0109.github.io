<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Calculator</title>
</head>

<body>
    <div class="container--wrapper">
        <div class="phone">
            <img src="./iphone.png" alt="">
            <div class="calculator--wrapper">
                <div class="iphone__ui">
                    <img src="./iphone-ui.jpg" alt="">
                    <button class="show-iphone"></button>
                </div>
                <div class="calculator">
                    <div class="screen">
                        <div class="navigation">
                            <div class="icon">
                                <span><i class="fa fa-signal"></i></span>
                                <span><i class="fa fa-wifi"></i></span>
                                <span><i class="fa fa-battery-three-quarters"></i></span>
                                <span>22:23 PM</span>
                            </div>
                        </div>
                        <div class="screen-calculator">
    
                        </div>
                    </div>
                    <div class="board">
                        <table>
                            <tr>
                                <td><span class="clear">C</span></td>
                                <td><span class="switch">&plusmn;</span></td>
                                <td><span class="percent">&percnt;</span></td>
                                <td><span class="num__input" char="/">&divide;</span></td>
                            </tr>
                            <tr>
                                <td><span class="num__input" char="7">7</span></td>
                                <td><span class="num__input" char="8">8</span></td>
                                <td><span class="num__input" char="9">9</span></td>
                                <td><span class="num__input" char="*">&times;</span></td>
                            </tr>
                            <tr>
                                <td><span class="num__input" char="4">4</span></td>
                                <td><span class="num__input" char="5">5</span></td>
                                <td><span class="num__input" char="6">6</span></td>
                                <td><span class="num__input" char="-">&minus;</span></td>
                            </tr>
                            <tr>
                                <td><span class="num__input" char="1">1</span></td>
                                <td><span class="num__input" char="2">2</span></td>
                                <td><span class="num__input" char="3">3</span></td>
                                <td><span class="num__input" char="+">&plus;</span></td>
                            </tr>
                            <tr>
                                <td colspan="2"><span class="num__input num-0" char="0">0</span></td>
                                <td><span class="num__input" char=".">.</span></td>
                                <td><span class="enter">=</span></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
            <button class="btn_back-home"></button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="./main.js"></script>
</body>

</html>
