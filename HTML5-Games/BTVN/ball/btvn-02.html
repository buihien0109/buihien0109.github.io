<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball BTVN 02</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: cornflowerblue;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <!---
  Tạo hiệu ứng hoạt hình bóng tự động di chuyển theo phương ngang
  Bổ xung thêm đoạn này
  function animate() {
    requestAnimationFrame(animate);
    c.clearRect(0, 0, canvas.width, canvas.height);
    ball.move();
  }

  animate();
-->
    <script>
        var canvas = document.getElementById("canvas");
        var c = canvas.getContext('2d');

        canvas.width = innerWidth - 100;
        canvas.height = innerHeight - 100;

        addEventListener("resize", function () {
            canvas.width = innerWidth - 100;
            canvas.height = innerHeight - 100;
        });


        class Ball {
            constructor(x, y, dx, radius, color) {
                this.x = x;
                this.y = y;
                this.dx = 0;  //Thêm property dx
                this.radius = radius;
                this.color = color;
            }

            draw() {
                c.beginPath();
                c.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                c.fillStyle = this.color;
                c.fill();
                c.stroke();
                c.closePath();
            }

            /* Bổ xung logic chặn bóng không đi quá tường trái và phải
            */
            move() {
                if (this.x > canvas.width - this.radius - 1) {
                    this.dx = - this.dx;
                }

                if (this.x + this.dx <= this.radius) {
                    this.dx = - this.dx;
                }

                if (this.x + this.dx > this.radius && this.x + this.dx <= canvas.width - this.radius - 1) {
                    if (this.dx > 0.2) {
                        this.dx -= 0.2
                    } else if (this.dx < -  0.2) {
                        this.dx += 0.2
                    } else {
                        this.dx = 0
                    }
                }
                this.x = this.x + this.dx;
                this.draw();
            }
        }

        //---------
        var ball = new Ball(21, canvas.height * 0.5, 0, 20, 'red');
        ball.draw();

        //Di chuyển sang trái và phải 
        addEventListener('keydown', function (event) {
            if (event.keyCode == 39) {
                ball.dx += 10;;
            }
            if (event.keyCode == 37) {
                ball.dx += -10;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            c.clearRect(0, 0, canvas.width, canvas.height);
            ball.move();
        }

        animate();
    </script>
</body>

</html>
