<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball BTVN 01</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        #canvas {
            background-color: cornflowerblue;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>

    <!---
  Tạo hiệu ứng hoạt hình bóng tự động di chuyển theo phương ngang
  Bổ xung thêm đoạn này
  function animate() {
    requestAnimationFrame(animate);
    c.clearRect(0, 0, canvas.width, canvas.height);
    ball.move();
  }

  animate();
-->
    <script>
        var canvas = document.getElementById("canvas");
        var c = canvas.getContext('2d');

        canvas.width = innerWidth - 50;
        canvas.height = innerHeight -50;

        addEventListener("resize", function () {
            canvas.width = innerWidth - 50;
            canvas.height = innerHeight - 50;
        });


        class Ball {
            constructor(x, y, dx, dy, radius, color, direction, current) {
                this.x = x;
                this.y = y;
                this.dx = dx;
                this.dy = dy;
                this.radius = radius;
                this.color = color;
                this.direction = direction;
                this.current = current
            }

            draw() {
                c.beginPath();
                c.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
                c.fillStyle = this.color;
                c.fill();   
                c.closePath();
            }

            /* Bổ xung logic chặn bóng không đi quá tường trái và phải
            */
            move() {

                let widthBall = this.radius + 1
                if(this.x + this.dx > canvas.width - widthBall) {
                    this.direction = 'bottom'
                } 
                if(this.y + this.dy > canvas.height - widthBall) {
                    this.direction = 'left'
                }
                if(this.x + this.dx < widthBall) {
                    this.direction = 'top'
                }
                if(this.y + this.dy < widthBall) {
                    this.direction = 'right'
                }

                switch(this.direction) {
                    case 'right':
                        this.dx = 5;
                        this.dy = 0;
                        break;
                    case 'bottom':
                        this.dx = 0;
                        this.dy = 5;
                        break;
                    case 'left':
                        this.dx = -5;
                        this.dy = 0;
                        break;
                    case 'top':
                        this.dx = 0;
                        this.dy = -5;
                        break;
                    default:
                        this.dx = 0;
                        this.dy = 0;
                        break;
                }

                this.x = this.x + this.dx;
                this.y = this.y + this.dy;
                
                this.draw();
            }

            jump(x, y) {
                c.clearRect(0, 0, canvas.width, canvas.height);
                this.x = x;
                this.y = y;
                this.draw();
            }
        }

        //---------
        var ball = new Ball(21, 21, 0, 0, 20, 'red');
        ball.draw();

        //Di chuyển sang trái và phải
        var count = 0
        addEventListener('keydown', function (event) {
            if (event.keyCode == 32) {
                count += 1
                if(count == 1) {
                    ball.direction = 'right'
                }
                if(count != 1 && count % 2 == 0) {
                    ball.current = ball.direction
                    ball.direction = 'stop'
                }
                if(count != 1 && count % 2 == 1) {
                    ball.direction = ball.current
                }
            }
        });

        addEventListener("click", function (event) {
            ball.jump(canvas.width * 0.5, canvas.height * 0.5);
        });

        function animate() {
            requestAnimationFrame(animate);
            c.clearRect(0, 0, canvas.width, canvas.height);
            ball.move();
        }

        animate();
    </script>
</body>

</html>
