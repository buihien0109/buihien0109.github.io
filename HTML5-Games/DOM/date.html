            },
            format: function format(date) {
                return [
                    ("0" + date.getDate()).slice(-2),           // Get day and pad it with zeroes
                    ("0" + (date.getMonth() + 1)).slice(-2),      // Get month and pad it with zeroes
                    date.getFullYear()                          // Get full year
