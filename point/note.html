<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #start-game, #game, #end-game {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        #start-game {
            background-color: blue;
        }
        #game {
            background-color: green;
            display: none;
        }
        #end-game {
            background-color: indigo;
            display: none;
        }
    </style>
</head>
<body>
    <div id="start-game">
        <button id="btn_start-game">Chơi game</button>
    </div>
    <div id="game">
        Vào chơi game thôi
    </div>
    <div id="end-game">
        <button id="btn_reload">Thoát</button>
    </div>

    <script>
        let start_game = document.getElementById('start-game')
        let end_game = document.getElementById('end-game')
        let game = document.getElementById('game')


        let btn_start_game = document.getElementById('btn_start-game')
        let btn_reload = document.getElementById('btn_reload')

        // Vào màn hình chơi game
        btn_start_game.addEventListener('click', function(){
            start_game.style.display = 'none'
            game.style.display = 'block'
        })

        // Giả lập thời gian chơi game là 5s từ khi load trang, sau đó chuyển sang màn hình end game
        setTimeout(() => {
            game.style.display = 'none'
            end_game.style.display = 'block'
        },5000)

        // Trở về màn hình start game
        btn_reload.addEventListener('click', function() {
            window.location.reload()
        })
    </script>
</body>
</html>
