<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japan</title>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        let canvas = document.getElementById('canvas')
        canvas.width = 1000
        canvas.height = 800
        canvas.style.background = '#f9f9f9'

        let ctx = canvas.getContext('2d');
        // Màu cờ Nhật bản :  #ED2124, #fff, #241D4F, #fff, #ED2124
        const WIDTH = 900
        const HEIGHT = 600

        ctx.beginPath()
        ctx.fillStyle = "#fff"
        ctx.fillRect(50,100, WIDTH, HEIGHT)
        ctx.closePath()

        ctx.beginPath()
        ctx.fillStyle = "#ED2124"
        ctx.arc(500, 400, 60, 0, 2* Math.PI)
        ctx.fill()
        ctx.closePath()
    </script>
</body>
</html>
