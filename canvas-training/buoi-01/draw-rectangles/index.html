        // var rectViolet = new Rect(0,300,100,200,'violet')

        // rectViolet.draw()
        
        //----------------------------------------------------------------------
        //Cách 2: Sử dụng Class trong ES6
        class Rect {
            constructor(dx, dy, width, height, color) {
                this.dx = dx
                this.dy = dy
                this.width = width
                this.height = height
                this.color = color
            }
            draw() {
                ctx.fillStyle= this.color;
                ctx.fillRect(this.dx, this.dy, this.width, this.width);
            }
        }

        var rectViolet = new Rect(0,300,100,200,'violet')
        console.log(rectViolet)
        rectViolet.draw()
