<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        img {
            max-width: 100%;
        }
        .banner-container {
            display: flex;
            width: 1200px;
            height: 450px;
            margin: auto;
        }

        .banner {
            flex-basis: 66.66%;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
        }

        .blog {
            flex-basis: 33.33%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding-left: 30px;

        }

        .blog-item {
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
            border-radius: 4px;
            background-color: #fff;
            height: 21.5%;
            display: flex;
        }

        .blog-img {
            flex-basis: 30%;
        }

        .blog-content {
            flex-basis: 70%;
            padding-left: 10px;
            padding-right: 10px;
        }

        .blog-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .blog-author {
            font-size: 12px;
            color: #696969;
        }

    </style>
</head>
