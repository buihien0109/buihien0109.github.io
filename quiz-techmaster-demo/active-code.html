<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,300i,400,400i,500,500i,700,700i&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/active-code.css">
    <title>Trang chủ</title>
</head>

<body>
    <!-- Header -->
    <div class="container-fluid" id="header"></div>
    <!-- End Header -->

    <!-- Active code -->
    <div class="container-fluid active-cod-wrap" style="min-height: 600px">
        <div class="active-cod">
            <div class="active-cod-detail">
                <div class="active-cod-title">
                    <h4>Kích hoạt đơn hàng</h4>
                </div>
                <div class="active-cod-title">
                    <i>Nhập mã kích hoạt chúng tôi gửi bạn. Các học viên trong thụ hưởng đơn hàng có thể tham gia làm bài thi trong mục Bài thi của tôi</i>
                </div>
                <form>
                    <div class="active-cod-input ">
                        <input type="text" id="keycode" placeholder="Nhập mã kích hoạt. VD: 5E6D1123DVBE">
                    </div>
                </form>
                <div class="active-cod-input btn-active-cod">Kích hoạt ngay</div>
            </div>
            
        </div>
    </div>
    <!-- End Active code -->

    <!-- Footer -->
    <div style="background-color:#464646" class="container-fluid" id="footer"></div>
    <!-- End Footer -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
